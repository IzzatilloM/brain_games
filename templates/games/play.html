{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ game.name }} — {{ SITE_NAME }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/mindskills.css' %}">
  <link rel="icon" href="{% static 'img/logo.svg' %}">
  <script>
    var t = localStorage.getItem('bg_theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
  </script>
</head>
<body>
{% if not access.allowed %}
  <div class="bg-boot" style="flex-direction:column;text-align:center;padding:20px">
    <div style="font-size:70px">🔒</div>
    <h2>{{ access.reason }}</h2>
    <a class="btn-ms mt-3" href="{% url 'games:list' %}">O'yinlarga qaytish</a>
  </div>
{% else %}
  <div id="player-root"><div class="bg-boot"><div class="bg-spin"></div></div></div>

  <script>
    window.BG_GAME = {{ game_json|safe }};
    window.BG_SIBLINGS = {{ siblings_json|safe }};
    window.BG_SUBMIT_URL = "{% url 'games:submit' game.slug %}";
    window.BG_HOME = "{{ home_url }}";
    window.BG_PLAY_BASE = "/oyinlar/play/";
    window.BG_CSRF = "{{ csrf_token }}";
    window.BG_SOUND = {{ user.sound_enabled|yesno:"true,false" }};
    window.BG_USER = { name: "{{ user.display_name|escapejs }}", avatar: "{{ user.avatar|escapejs }}" };
    window.BG_BG_IMG = "{% static 'img/boygirlimage.png' %}";
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="{% static 'js/react/games.jsx' %}" data-presets="react"></script>
{% endif %}
</body>
</html>
